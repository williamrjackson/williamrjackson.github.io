<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Gallery Theater Mode Documentation</title>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown-light.min.css">

  <style>
    body {
      box-sizing: border-box;
      min-width: 200px;
      max-width: 980px;
      margin: 0 auto;
      padding: 45px;
      background: #ffffff;
    }

    @media (max-width: 767px) {
      body {
        padding: 15px;
      }
    }

    .markdown-body {
      background: #ffffff;
    }

    .markdown-body img {
      max-width: 100%;
      height: auto;
    }
  </style>
</head>
<body>
  <article id="content" class="markdown-body">Loading…</article>

  <script>
    const repoBase = "https://raw.githubusercontent.com/williamrjackson/GalleryTheaterMode/master/";
    const repoBlobBase = "https://github.com/williamrjackson/GalleryTheaterMode/blob/master/";

    fetch(repoBase + "README.md")
      .then(r => r.text())
      .then(md => {
        md = md.replace(/!\[(.*?)\]\((?!https?:\/\/|\/)(.*?)\)/g, (match, alt, path) => {
          return `![${alt}](${repoBase}${path})`;
        });

        md = md.replace(/(?<!!)\[(.*?)\]\((?!https?:\/\/|#|\/)(.*?)\)/g, (match, text, path) => {
          return `[${text}](${repoBlobBase}${path})`;
        });

        document.getElementById("content").innerHTML = marked.parse(md);
      })
      .catch(err => {
        document.getElementById("content").innerHTML = `<p>Failed to load README.</p><pre>${err}</pre>`;
      });
  </script>
</body>
</html>
