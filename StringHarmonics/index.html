<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | String Harmonics</title>
  </head>
  <body style="text-align: center; padding: 0; border: 0; margin: 0;">
    <style>
      /* Tight stacked layout: video directly above activity */
      html, body { height: 100%; }
      .page { box-sizing: border-box; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 8px 0; }
      .media, .activity { flex: none; margin: 0; padding: 0; display: flex; align-items: center; justify-content: center; }
      /* fixed 960x540 layout but responsive down to viewport width */
      .video-embed { width: 960px; height: 540px; max-width: calc(100% - 24px); }
      #unity-canvas { width: 960px; height: 540px; max-width: calc(100% - 24px); background: #FFFFFF; }
    </style>

    <div class="page">
      <div class="media">
        <iframe class="video-embed" width="960" height="540" src="https://www.youtube.com/embed/EfTnrNw8Xw8" title="Physics of Natural Harmonics | Science Minisode" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
      </div>
      <div class="activity">
        <div style="display:flex;flex-direction:column;align-items:center;gap:8px;">
          <canvas id="unity-canvas" width="960" height="540" tabindex="-1"></canvas>
        </div>
      </div>
    </div>
    <script src="Build/StringHarmonics.loader.js"></script>
    <script>
      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        // Mobile device style: fill the whole browser client area with the game canvas:
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);

        var canvas = document.querySelector("#unity-canvas");
        canvas.style.width = "960px";
        canvas.style.height = "540px";
        canvas.style.position = "fixed";

        document.body.style.textAlign = "left";

      }

      createUnityInstance(document.querySelector("#unity-canvas"), {
        arguments: [],
        dataUrl: "Build/StringHarmonics.data",
        frameworkUrl: "Build/StringHarmonics.framework.js",
        codeUrl: "Build/StringHarmonics.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Museum of Science",
        productName: "String Harmonics",
        productVersion: "0.1",
        matchWebGLToCanvasSize: false, // Uncomment this to separately control WebGL canvas render size and DOM element size.
        // devicePixelRatio: 1, // Uncomment this to override low DPI rendering on high DPI displays.
      }).then((unityInstance) => {
        // expose for JS interactions (e.g., unlock button)
        window.unityInstance = unityInstance;
      }).catch((message) => {
        alert(message);
      });
    </script>
  </body>
</html>
